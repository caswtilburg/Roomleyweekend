<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>RMLY · Budapest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Bebas+Neue&family=Fragment+Mono&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #111; }
    @media (max-width: 768px) {
      .hero-padding  { padding: 48px 24px 52px !important; }
      .content-pad   { padding: 48px 24px 72px !important; }
      .topbar-pad    { padding: 0 20px !important; }
      .footer-pad    { padding: 20px 24px !important; flex-direction: column !important; gap: 8px !important; }
      .info-grid     { grid-template-columns: 1fr 1fr !important; }
      .weer-label    { flex-direction: column !important; gap: 6px !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TERRA = '#c44a2a';
const BLACK = '#111111';
const BEIGE = '#f5f0e8';
const DEEP  = '#0a0704';
const PAPER = '#faf6ee';

const DAG_LABELS  = ['Do', 'Vr', 'Za', 'Zo'];
const DAG_DATUMS  = ['25 jun', '26 jun', '27 jun', '28 jun'];

function weerOmschrijving(code) {
  if (code === 0)  return 'Zonnig';
  if (code <= 3)   return 'Bewolkt';
  if (code <= 48)  return 'Mist';
  if (code <= 55)  return 'Motregen';
  if (code <= 65)  return 'Regen';
  if (code <= 82)  return 'Buien';
  if (code <= 99)  return 'Onweer';
  return '—';
}

function weerIcoon(code) {
  if (code === 0)  return '☀️';
  if (code <= 2)   return '🌤️';
  if (code <= 3)   return '☁️';
  if (code <= 48)  return '🌫️';
  if (code <= 67)  return '🌧️';
  if (code <= 82)  return '⛈️';
  if (code <= 99)  return '⛈️';
  return '🌡️';
}

function useWeather() {
  const [data, setData]     = React.useState(null);
  const [status, setStatus] = React.useState('loading');

  React.useEffect(() => {
    const url = [
      'https://api.open-meteo.com/v1/forecast',
      '?latitude=47.4979&longitude=19.0402',
      '&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code',
      '&timezone=Europe%2FBudapest',
      '&start_date=2026-06-25&end_date=2026-06-28',
    ].join('');

    fetch(url)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(json => {
        const d = json.daily;
        if (!d || !d.time) throw new Error();
        setData(d.time.map((_, i) => ({
          max:  Math.round(d.temperature_2m_max[i]),
          min:  Math.round(d.temperature_2m_min[i]),
          rain: d.precipitation_probability_max[i] ?? 0,
          code: d.weather_code[i],
        })));
        setStatus('ok');
      })
      .catch(() => setStatus('error'));
  }, []);

  return { data, status };
}

function App() {
  const { data: weer, status: weerStatus } = useWeather();

  return (
    <div style={{ fontFamily: "'DM Sans', sans-serif" }}>

      {/* ── Topbar ── */}
      <div className="topbar-pad" style={{
        background: BLACK, height: 52, padding: '0 36px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        position: 'relative', zIndex: 10,
        borderBottom: '1px solid rgba(245,240,232,0.06)',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 30, color: TERRA, lineHeight: 1 }}>R</div>
          <div>
            <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 15, fontWeight: 900, letterSpacing: '0.10em', textTransform: 'uppercase', color: BEIGE, lineHeight: 1 }}>
              RMLY · <span style={{ color: TERRA }}>2026</span>
            </div>
            <div style={{ fontFamily: "'Fragment Mono', monospace", fontSize: 8, color: 'rgba(245,240,232,0.28)', letterSpacing: '0.15em', marginTop: 2 }}>
              25 — 28 · 06 · BOEDAPEST
            </div>
          </div>
        </div>
        <div style={{ fontFamily: "'Fragment Mono', monospace", fontSize: 9, letterSpacing: '0.25em', color: 'rgba(245,240,232,0.28)', textTransform: 'uppercase' }}>
          roomleyweekend.nl/budapest
        </div>
      </div>

      {/* ── Hero: terracotta ── */}
      <div className="hero-padding" style={{
        background: TERRA, padding: '80px 56px 72px',
        position: 'relative', overflow: 'hidden',
        minHeight: 480, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end',
      }}>
        <div style={{
          position: 'absolute', top: -80, left: -20,
          fontFamily: "'Bebas Neue', sans-serif",
          fontSize: 580, lineHeight: 1, color: 'rgba(0,0,0,0.07)',
          pointerEvents: 'none', userSelect: 'none',
        }}>R</div>

        <div style={{ position: 'relative', zIndex: 1, maxWidth: 780 }}>
          <div style={{
            fontFamily: "'Fragment Mono', monospace",
            fontSize: 10, letterSpacing: '0.35em', textTransform: 'uppercase',
            color: 'rgba(245,240,232,0.55)', marginBottom: 28,
          }}>━━ Roomley Weekend · 25–28 juni 2026</div>

          <div style={{
            fontFamily: "'Barlow Condensed', sans-serif",
            fontSize: 'clamp(52px, 9vw, 110px)',
            fontWeight: 900, textTransform: 'uppercase',
            letterSpacing: '0.02em', lineHeight: 0.88,
            color: BEIGE, marginBottom: 32,
          }}>GOED GEVONDEN.</div>

          <div style={{
            fontFamily: "'DM Sans', sans-serif",
            fontSize: 17, lineHeight: 1.7,
            color: 'rgba(245,240,232,0.82)',
            fontWeight: 300, maxWidth: 520,
          }}>
            Slim bedacht, of heb je een Agent laten werken? Maakt niet uit, je bent waarschijnlijk een van de weinigen die definitief weet waar we naartoe gaan. Leuk als het nog even geheim blijft, dus houd je mond!
          </div>
        </div>
      </div>

      {/* ── Content: beige ── */}
      <div style={{ background: BEIGE, position: 'relative', overflow: 'hidden' }}>
        <div style={{
          position: 'absolute', right: -20, bottom: -60,
          fontFamily: "'Bebas Neue', sans-serif",
          fontSize: 480, lineHeight: 1, color: 'rgba(196,74,42,0.06)',
          pointerEvents: 'none', userSelect: 'none',
        }}>R</div>

        <div className="content-pad" style={{ maxWidth: 860, margin: '0 auto', padding: '72px 56px 100px', position: 'relative', zIndex: 1 }}>

          {/* Bestemming */}
          <div style={{ marginBottom: 64 }}>
            <div style={{
              fontFamily: "'Fragment Mono', monospace",
              fontSize: 9, letterSpacing: '0.35em', textTransform: 'uppercase',
              color: TERRA, marginBottom: 20,
            }}>━━ De bestemming</div>

            <div style={{
              fontFamily: "'Bebas Neue', sans-serif",
              fontSize: 'clamp(72px, 12vw, 148px)',
              lineHeight: 0.88, color: BLACK,
              letterSpacing: '0.02em', marginBottom: 24,
            }}>BOEDAPEST</div>

            <div style={{
              fontFamily: "'Fragment Mono', monospace",
              fontSize: 11, color: 'rgba(17,17,17,0.45)', letterSpacing: '0.15em',
            }}>Hongarije · 47°30'N, 19°03'O · Juni 2026</div>
          </div>

          <div style={{ height: 1, background: 'rgba(17,17,17,0.10)', marginBottom: 56 }}/>

          {/* Info grid */}
          <div className="info-grid" style={{
            display: 'grid', gridTemplateColumns: '1fr 1fr 1fr',
            gap: 1, background: 'rgba(17,17,17,0.10)',
            border: '1px solid rgba(17,17,17,0.10)', marginBottom: 56,
          }}>
            {[
              { label: 'Vertrek',    value: '25 juni · 05:30', desc: "McDonald's Udenhout. Ja, dat is vroeg." },
              { label: 'Terugkomst', value: '28 juni · ~19:00', desc: 'Zondag. Moe. Tevreden. Klaar.' },
              { label: 'Groep',      value: '17 Soldiers',      desc: 'Eén stad. Vier dagen. Geen excuses.' },
            ].map(({ label, value, desc }) => (
              <div key={label} style={{ background: PAPER, padding: '28px 24px' }}>
                <div style={{
                  fontFamily: "'Fragment Mono', monospace",
                  fontSize: 8, letterSpacing: '0.3em', textTransform: 'uppercase',
                  color: 'rgba(17,17,17,0.38)', marginBottom: 12,
                }}>{label}</div>
                <div style={{
                  fontFamily: "'Barlow Condensed', sans-serif",
                  fontSize: 28, fontWeight: 900, textTransform: 'uppercase',
                  color: BLACK, letterSpacing: '0.02em', lineHeight: 1, marginBottom: 6,
                }}>{value}</div>
                <div style={{
                  fontFamily: "'DM Sans', sans-serif",
                  fontSize: 13, color: 'rgba(17,17,17,0.55)', fontWeight: 300,
                }}>{desc}</div>
              </div>
            ))}
          </div>

          {/* Weersectie */}
          <div style={{ marginBottom: 56 }}>
            <div className="weer-label" style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 20, flexWrap: 'wrap', gap: 8 }}>
              <div style={{
                fontFamily: "'Fragment Mono', monospace",
                fontSize: 9, letterSpacing: '0.35em', textTransform: 'uppercase', color: TERRA,
              }}>━━ Weer Boedapest · 25–28 juni</div>
              <a href="https://www.accuweather.com/en/hu/budapest/187423/10-day-weather-forecast/187423" target="_blank" rel="noopener" style={{
                fontFamily: "'Fragment Mono', monospace",
                fontSize: 9, letterSpacing: '0.2em', textTransform: 'uppercase',
                color: 'rgba(17,17,17,0.38)', textDecoration: 'none',
                borderBottom: '1px solid rgba(17,17,17,0.2)', paddingBottom: 1,
              }}>AccuWeather ↗</a>
            </div>

            {weerStatus === 'loading' && (
              <div style={{
                fontFamily: "'Fragment Mono', monospace", fontSize: 11,
                color: 'rgba(17,17,17,0.38)', letterSpacing: '0.1em', padding: '32px 0',
              }}>Weerbericht laden…</div>
            )}

            {weerStatus === 'error' && (
              <div style={{
                fontFamily: "'Fragment Mono', monospace", fontSize: 11,
                color: 'rgba(17,17,17,0.38)', letterSpacing: '0.1em', padding: '32px 0',
              }}>
                Kon het weerbericht niet laden.{' '}
                <a href="https://www.weeronline.nl/europa/hongarije/budapest/weather#10-days" target="_blank" rel="noopener"
                   style={{ color: TERRA, textDecoration: 'none', borderBottom: `1px solid ${TERRA}` }}>
                  Bekijk op Weeronline.nl ↗
                </a>
              </div>
            )}

            {weerStatus === 'ok' && weer && (
              <>
                <div style={{
                  display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)',
                  gap: 1, background: 'rgba(17,17,17,0.10)',
                  border: '1px solid rgba(17,17,17,0.10)',
                  marginBottom: 10,
                }}>
                  {weer.map((dag, i) => (
                    <div key={i} style={{ background: PAPER, padding: '24px 16px', textAlign: 'center' }}>
                      <div style={{
                        fontFamily: "'Fragment Mono', monospace",
                        fontSize: 8, letterSpacing: '0.25em', textTransform: 'uppercase',
                        color: 'rgba(17,17,17,0.38)', marginBottom: 4,
                      }}>{DAG_DATUMS[i]}</div>
                      <div style={{
                        fontFamily: "'Barlow Condensed', sans-serif",
                        fontSize: 14, fontWeight: 900, textTransform: 'uppercase',
                        color: 'rgba(17,17,17,0.50)', letterSpacing: '0.1em', marginBottom: 12,
                      }}>{DAG_LABELS[i]}</div>
                      <div style={{ fontSize: 28, marginBottom: 8 }}>{weerIcoon(dag.code)}</div>
                      <div style={{
                        fontFamily: "'Barlow Condensed', sans-serif",
                        fontSize: 40, fontWeight: 900, color: TERRA,
                        lineHeight: 1, marginBottom: 2,
                      }}>~{dag.max}°</div>
                      <div style={{
                        fontFamily: "'Fragment Mono', monospace",
                        fontSize: 8, letterSpacing: '0.15em', textTransform: 'uppercase',
                        color: 'rgba(17,17,17,0.30)', marginBottom: 4,
                      }}>dag</div>
                      <div style={{
                        fontFamily: "'Barlow Condensed', sans-serif",
                        fontSize: 24, fontWeight: 900, color: 'rgba(17,17,17,0.55)',
                        lineHeight: 1, marginBottom: 2,
                      }}>~{dag.min}°</div>
                      <div style={{
                        fontFamily: "'Fragment Mono', monospace",
                        fontSize: 8, letterSpacing: '0.15em', textTransform: 'uppercase',
                        color: 'rgba(17,17,17,0.30)', marginBottom: 10,
                      }}>nacht</div>
                      <div style={{
                        fontFamily: "'Fragment Mono', monospace",
                        fontSize: 9, letterSpacing: '0.08em',
                        color: 'rgba(17,17,17,0.55)', marginBottom: 6,
                      }}>{weerOmschrijving(dag.code)}</div>
                      <div style={{
                        fontFamily: "'Fragment Mono', monospace",
                        fontSize: 9, color: dag.rain > 40 ? TERRA : 'rgba(17,17,17,0.30)',
                      }}>{dag.rain}% regen</div>
                    </div>
                  ))}
                </div>
                <div style={{
                  fontFamily: "'Fragment Mono', monospace",
                  fontSize: 9, color: 'rgba(17,17,17,0.35)',
                  letterSpacing: '0.08em', lineHeight: 1.6,
                }}>
                  ~ = schatting · voorspelling wordt nauwkeuriger naarmate de datum nadert · ververs de pagina voor live data
                </div>
              </>
            )}
          </div>

          {/* Slotwoord */}
          <div style={{
            border: '1px solid rgba(196,74,42,0.3)',
            background: 'rgba(196,74,42,0.04)',
            padding: '28px 32px',
          }}>
            <div style={{
              fontFamily: "'Fragment Mono', monospace",
              fontSize: 9, letterSpacing: '0.3em', textTransform: 'uppercase',
              color: TERRA, marginBottom: 14,
            }}>━━ Nog even dit</div>
            <div style={{
              fontFamily: "'DM Sans', sans-serif",
              fontSize: 15, lineHeight: 1.7,
              color: 'rgba(17,17,17,0.7)', fontWeight: 300, maxWidth: 600,
            }}>
              Zeg het niet door. De rest mag het zelf uitzoeken, of wachten tot ze op het vliegveld staan. Dat is de afspraak. Zorg dat je er op tijd bij bent op 25 juni.
            </div>
          </div>

        </div>
      </div>

      {/* ── Footer ── */}
      <div className="footer-pad" style={{
        background: DEEP, padding: '28px 56px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        position: 'relative', overflow: 'hidden',
      }}>
        <div style={{
          position: 'absolute', right: -14, bottom: -40,
          fontFamily: "'Bebas Neue', sans-serif",
          fontSize: 180, color: 'rgba(196,74,42,0.07)', lineHeight: 1,
          pointerEvents: 'none', userSelect: 'none',
        }}>R</div>
        <div style={{
          fontFamily: "'Fragment Mono', monospace",
          fontSize: 9, letterSpacing: '0.25em',
          color: 'rgba(245,240,232,0.25)', textTransform: 'uppercase',
          position: 'relative', zIndex: 1,
        }}>RMLY · 2026 · Hooligan FC</div>
        <div style={{
          fontFamily: "'Fragment Mono', monospace",
          fontSize: 9, letterSpacing: '0.2em',
          color: 'rgba(245,240,232,0.18)',
          position: 'relative', zIndex: 1,
        }}>roomleyweekend.nl</div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
