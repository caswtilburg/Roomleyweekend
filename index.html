<body>

<script type="text/babel">

// ─── Tokens ───────────────────────────────────────────────────────────────────
const BLACK = '#111111';
const TERRA = '#c44a2a';
const BEIGE = '#f5f0e8';
const DEEP  = '#0a0704';
const PAPER = '#faf6ee';

const NAV = [
  { key: 'home',       label: 'Home',            sub: 'Overzicht' },
  { key: 'programma',  label: 'Programma',        sub: '4 dagen, 3 nachten' },
  { key: 'paklijst',   label: 'Paklijst',         sub: 'Wat neem je mee' },
  { key: 'weer',       label: 'Weersverwachting', sub: '± 25 °C' },
  { key: 'locatie',    label: 'Locatie',          sub: 'Adres & route' },
];

const NAMES = ['Daan','Cas','Bas','Hugo','Huub','Jordi','Bram','Lars','Max','Pepijn','Robin','Roel','Voerbak','Ruben','Sander','Sebas','Stijn'];

// ─── Hooks ────────────────────────────────────────────────────────────────────
function useIsDesktop() {
  const [d, setD] = React.useState(() => window.innerWidth >= 768);
  React.useEffect(() => {
    const mq = window.matchMedia('(min-width: 768px)');
    const h = e => setD(e.matches);
    mq.addEventListener('change', h);
    return () => mq.removeEventListener('change', h);
  }, []);
  return d;
}

function useCountdown() {
  const [now, setNow] = React.useState(new Date());
  React.useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const target = new Date('2026-06-25T06:00:00+02:00');
  const diff = Math.max(0, target - now);
  return {
    days:    Math.floor(diff / 86400000),
    hours:   Math.floor((diff / 3600000) % 24),
    minutes: Math.floor((diff / 60000) % 60),
    seconds: Math.floor((diff / 1000) % 60),
  };
}

// ─── Brand ────────────────────────────────────────────────────────────────────
function Brand() {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
      <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 30, color: TERRA, lineHeight: 1 }}>R</div>
      <div>
        <div style={{
          fontFamily: "'Barlow Condensed', sans-serif",
          fontSize: 15, fontWeight: 900, letterSpacing: '0.10em',
          textTransform: 'uppercase', color: BEIGE, lineHeight: 1,
        }}>RMLY · <span style={{ color: TERRA }}>2026</span></div>
        <div style={{
          fontFamily: "'Fragment Mono', monospace",
          fontSize: 8, color: 'rgba(245,240,232,0.28)', letterSpacing: '0.15em', marginTop: 2,
        }}>25 — 28 · 06</div>
      </div>
    </div>
  );
}

// ─── Topbar ───────────────────────────────────────────────────────────────────
function Topbar({ currentPage, setCurrentPage, desktop }) {
  return (
    <div style={{ background: BLACK, flexShrink: 0, position: 'sticky', top: 0, zIndex: 100 }}>
      {/* Brand row */}
      <div style={{
        padding: desktop ? '0 36px' : '0 20px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        height: desktop ? 60 : 48,
      }}>
        <Brand/>
        {desktop && (
          <nav style={{ display: 'flex', gap: 28 }}>
            {NAV.map(p => (
              <button key={p.key} onClick={() => setCurrentPage(p.key)} style={{
                appearance: 'none', border: 'none', background: 'transparent',
                fontFamily: "'Barlow Condensed', sans-serif",
                fontSize: 24, fontWeight: 900,
                letterSpacing: '0.10em', textTransform: 'uppercase',
                color: currentPage === p.key ? TERRA : 'rgba(245,240,232,0.32)',
                cursor: 'pointer', padding: '4px 0', lineHeight: 1,
                transition: 'color 120ms ease',

            ))}
          </nav>
        )}
      </div>
      {/* Mobile nav row */}
      {!desktop && (
        <div style={{
          display: 'flex', overflowX: 'auto',
          borderTop: '1px solid rgba(245,240,232,0.07)',
          scrollbarWidth: 'none',
        }}>
          {NAV.map(p => (
            <button key={p.key} onClick={() => setCurrentPage(p.key)} style={{
              appearance: 'none', border: 'none', background: 'transparent',
              fontFamily: "'Barlow Condensed', sans-serif",
              fontSize: 15, fontWeight: 900,
              letterSpacing: '0.08em', textTransform: 'uppercase',
              color: currentPage === p.key ? TERRA : 'rgba(245,240,232,0.35)',
              cursor: 'pointer', padding: '10px 16px', lineHeight: 1,
              whiteSpace: 'nowrap', flexShrink: 0,

            }}>{p.label}</button>

}

// ─── R Watermark ──────────────────────────────────────────────────────────────
function RWatermark({ color, size }) {
  const c = color || 'rgba(196,74,42,0.06)';
  const s = size || 380;
  return (
    <div style={{
      position: 'absolute', right: -20, bottom: -60,
      fontFamily: "'Bebas Neue', sans-serif",
      fontSize: s, lineHeight: 1, color: c,
      pointerEvents: 'none', userSelect: 'none', zIndex: 0,
    }}>R</div>
  );
}

// ─── MaskedWord ───────────────────────────────────────────────────────────────
function MaskedWord({ word, fontSize, revealedIdx, setRevealedIdx, onDark }) {
  const textColor = onDark ? BEIGE : BLACK;
  return (
    <div style={{
      fontFamily: "'Barlow Condensed', sans-serif",
      fontWeight: 900, fontSize, lineHeight: 0.88,
      textTransform: 'uppercase', color: textColor,
      letterSpacing: '0.02em',
      display: 'flex', flexWrap: 'wrap', gap: '0.02em',
      userSelect: 'none',
    }}>
      {word.split('').map((ch, i) => {
        const revealed = revealedIdx === i;
        return (
          <button key={i}
            onClick={() => setRevealedIdx(revealed ? null : i)}
            style={{
              appearance: 'none', border: 0, padding: 0, margin: 0,
              background: 'transparent', cursor: 'pointer',
              fontFamily: 'inherit', fontWeight: 'inherit',
              fontSize: 'inherit', lineHeight: 'inherit',
              letterSpacing: 'inherit', color: 'inherit',
              position: 'relative',
              width: '0.60em', height: '0.88em',
              display: 'inline-flex', alignItems: 'flex-end', justifyContent: 'center',
              overflow: 'hidden',
            }}>
            <span style={{
              position: 'absolute', inset: 0,
              display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
              color: textColor,
              opacity: revealed ? 1 : 0,
              transform: revealed ? 'translateY(0)' : 'translateY(8%)',
              transition: 'opacity 220ms ease, transform 280ms ease',
            }}>{ch}</span>
            <span style={{
              position: 'absolute', inset: 0,
              background: revealed ? 'transparent' : TERRA,
              transform: revealed ? 'translateY(101%)' : 'translateY(0)',
              transition: 'transform 320ms cubic-bezier(.7,0,.2,1)',
            }}/>
            {!revealed && (
              <span style={{
                position: 'absolute', inset: 0,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: "'Fragment Mono', monospace",
                fontSize: '0.18em', fontWeight: 400, letterSpacing: '0.2em',
                color: BEIGE, opacity: 0.5, pointerEvents: 'none',
              }}>{String(i+1).padStart(2,'0')}</span>
            )}
          </button>
        );
      })}
    </div>
  );
}

// ─── Mobile back button ────────────────────────────────────────────────────────
function MobileBack({ setCurrentPage }) {
  return (
    <button onClick={() => setCurrentPage('home')} style={{
      appearance: 'none', border: 0,
      background: 'transparent',
      display: 'flex', alignItems: 'center', gap: 10,
      padding: '0 0 16px 0',

      borderBottom: '1px solid rgba(17,17,17,0.10)',

        fontFamily: "'Fragment Mono', monospace", fontSize: 9,
        letterSpacing: '0.3em', textTransform: 'uppercase', color: TERRA,

}

// ─── Mobile nav buttons ────────────────────────────────────────────────────────
function MobileNavButtons({ setCurrentPage, exclude }) {
  const [pressed, setPressed] = React.useState(null);
  const items = NAV.filter(p => p.key !== 'home' && p.key !== exclude);
  const go = (key) => {
    setPressed(key);
    setTimeout(() => { setPressed(null); setCurrentPage(key); }, 180);
  };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      <div style={{
        fontFamily: "'Fragment Mono', monospace",
        fontSize: 8, letterSpacing: '0.35em', textTransform: 'uppercase',
        color: 'rgba(17,17,17,0.38)', marginBottom: 4,
      }}>━━ Navigatie</div>
      {items.map(b => (
        <button key={b.key} onClick={() => go(b.key)} style={{
          appearance: 'none', width: '100%',
          background: pressed === b.key ? 'rgba(196,74,42,0.10)' : PAPER,
          border: `1px solid ${pressed === b.key ? TERRA : 'rgba(17,17,17,0.14)'}`,

          display: 'flex', alignItems: 'center', gap: 14, cursor: 'pointer',
          textAlign: 'left', transition: 'all 100ms ease',
          transform: pressed === b.key ? 'scale(0.98)' : 'scale(1)',

          <div style={{ flex: 1 }}>
            <div style={{
              fontFamily: "'Barlow Condensed', sans-serif",
              fontSize: 20, fontWeight: 900, textTransform: 'uppercase',
              letterSpacing: '0.04em', lineHeight: 1, color: BLACK, marginBottom: 2,
            }}>{b.label}</div>
            <div style={{
              fontFamily: "'Fragment Mono', monospace",
              fontSize: 10, color: 'rgba(17,17,17,0.42)',
            }}>{b.sub}</div>
          </div>
          <div style={{ color: TERRA, fontFamily: "'Fragment Mono', monospace", fontSize: 14 }}>↗</div>
        </button>
      ))}
    </div>
  );
}

// ─── PageLabel ────────────────────────────────────────────────────────────────

      border: '1px solid rgba(17,17,17,0.10)',

// ─── SubPage wrapper (desktop) ─────────────────────────────────────────────────
function SubShell({ children, maxWidth }) {

  return (

// ─── HomePage ─────────────────────────────────────────────────────────────────

        </div>
        <div style={{ marginTop: 36, paddingTop: 28, borderTop: '1px solid rgba(245,240,232,0.07)' }}>
          <div style={{

            fontSize: 8, letterSpacing: '0.3em', textTransform: 'uppercase',

  if (desktop) {
    return (
      <div>
        {/* Hero 50/50 */}

          {/* Left: terracotta */}

            <div style={{
              position: 'absolute', top: -60, left: -12,

          fontFamily: "'Fragment Mono', monospace",
          fontSize: 8, letterSpacing: '0.35em', textTransform: 'uppercase',
          color: 'rgba(17,17,17,0.38)', marginBottom: 12,
        }}>━━ Alles wat je moet weten</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {navItems.map(b => (
            <button key={b.key} onClick={() => go(b.key)} style={{
              appearance: 'none', width: '100%',
              background: pressed === b.key ? 'rgba(196,74,42,0.10)' : PAPER,
              border: `1px solid ${pressed === b.key ? TERRA : 'rgba(17,17,17,0.14)'}`,
              color: BLACK, padding: '14px 18px',
              display: 'flex', alignItems: 'center', gap: 14, cursor: 'pointer',
              textAlign: 'left', transition: 'all 100ms ease',
              transform: pressed === b.key ? 'scale(0.98)' : 'scale(1)',
            }}>
              <div style={{ flex: 1 }}>
                <div style={{
                  fontFamily: "'Barlow Condensed', sans-serif",
                  fontSize: 22, fontWeight: 900, textTransform: 'uppercase',

                }}>{b.label}</div>

                  fontFamily: "'Fragment Mono', monospace",

      <SoldiersBlock cols={2} size={52}/>

// ─── ProgrammaPage ────────────────────────────────────────────────────────────
function ProgrammaPage({ setCurrentPage, desktop }) {
  const schedule = [
    { day: 'Donderdag 25 juni', events: [

        <div style={{
          marginTop: 14, fontFamily: "'Fragment Mono', monospace",
          fontSize: 10, color: 'rgba(17,17,17,0.40)', letterSpacing: '0.08em',
        }}>Tik op de letters om meer te zien...</div>
      </div>
    </>
  );

  // ── Desktop: 50/50 split ──────────────────────────────────────────────────
  if (desktop) {
    return (
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', minHeight: 'calc(100vh - 60px)', alignItems: 'start' }}>
        <div style={{ background: BEIGE, padding: '52px 56px 80px', position: 'relative', overflow: 'hidden' }}>
          <RWatermark color="rgba(196,74,42,0.06)" size={380}/>
          <div style={{ position: 'relative', zIndex: 1 }}>
            {content}
          </div>
        </div>
        <div style={{
          position: 'sticky', top: 60,
          height: 'calc(100vh - 60px)',
          backgroundImage: 'url(Locatie.jpg)',
          backgroundSize: 'cover', backgroundPosition: 'center',
          backgroundColor: DEEP,
        }}/>
      </div>
    );
  }

  // ── Mobiel: foto fixed, content scrolt eroverheen ─────────────────────────
  return (
    <div style={{ position: 'relative', minHeight: '100vh' }}>
      <div style={{
        position: 'fixed', top: 52, left: 0,
        width: '100%', height: 'calc(100vh - 52px)',
        backgroundImage: 'url(Locatie.jpg)',
        backgroundSize: 'cover', backgroundPosition: 'center',
        zIndex: 1,
      }}/>
      <div style={{ height: '42vh', position: 'relative', zIndex: 2 }}/>
      <div style={{
        position: 'relative', zIndex: 10,
        background: BEIGE, padding: '28px 20px 48px',
      }}>
        <MobileBack setCurrentPage={setCurrentPage}/>
        {content}
        <div style={{ marginTop: 32 }}>
          <MobileNavButtons setCurrentPage={setCurrentPage} exclude="locatie"/>
        </div>
      </div>
      <div style={{ height: 'calc(100vh - 52px)', position: 'relative', zIndex: 2 }}/>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
const App = () => {
  const [currentPage, setCurrentPage] = React.useState('home');
  const desktop = useIsDesktop();

  React.useEffect(() => { window.scrollTo(0, 0); }, [currentPage]);

  const props = { setCurrentPage, desktop };

  const renderPage = () => {
    switch(currentPage) {
      case 'programma': return <ProgrammaPage {...props}/>;
      case 'paklijst':  return <PaklijstPage  {...props}/>;
      case 'weer':      return <WeerPage      {...props}/>;
      case 'locatie':   return <LocatiePage   {...props}/>;
      default:          return <HomePage      {...props}/>;
    }
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100%', background: BLACK }}>
      <Topbar currentPage={currentPage} setCurrentPage={setCurrentPage} desktop={desktop}/>
      <div style={{ flex: 1 }}>{renderPage()}</div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
