// ─── Hooks ────────────────────────────────────────────────────────────────────
function useIsDesktop() {
  const [d, setD] = React.useState(() => window.innerWidth >= 768);
  React.useEffect(() => {
    const mq = window.matchMedia('(min-width: 768px)');
    const h = e => setD(e.matches);
    mq.addEventListener('change', h);
    return () => mq.removeEventListener('change', h);
  }, []);
  return d;
}

function useCountdown() {
  const [now, setNow] = React.useState(new Date());
  React.useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const target = new Date('2026-06-25T06:00:00+02:00');
  const diff = Math.max(0, target - now);
  return {
    days:    Math.floor(diff / 86400000),
    hours:   Math.floor((diff / 3600000) % 24),
    minutes: Math.floor((diff / 60000) % 60),
    seconds: Math.floor((diff / 1000) % 60),
  };
}

              fontFamily: 'inherit', fontWeight: 'inherit',
              fontSize: 'inherit', lineHeight: 'inherit',

            <span style={{

// ─── FadeIn ───────────────────────────────────────────────────────────────────
function FadeIn({ children, delay, style }) {
  const ref = React.useRef(null);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold: 0.1 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? 'translateY(0)' : 'translateY(22px)',
      transition: `opacity 600ms ease ${delay || 0}ms, transform 600ms ease ${delay || 0}ms`,
      ...style,
    }}>
      {children}
    </div>
  );
}

              }}>Naam</th>
              {MONTHS.map(m => (
                <th key={m} style={thStyle}>{m}</th>
              ))}
              <th style={{ ...thStyle, color: BEIGE }}>Betaald</th>
              <th style={{ ...thStyle, color: BEIGE }}>Open</th>
            </tr>
          </thead>
          <tbody>
            {PAYMENTS.map((p, i) => {
              const isMe = p.naam === playerName;
              const voldaan = p.open === 0;
              const rowBg = i % 2 === 0 ? PAPER : BEIGE;
              return (
                <tr key={p.naam} style={{
                  background: rowBg,
                  outline: isMe ? `2px solid ${TERRA}` : 'none',
                  outlineOffset: '-2px',
                }}>
                  <td style={{
                    ...tdStyle, textAlign: 'left',
                    fontFamily: "'Barlow Condensed', sans-serif",
                    fontSize: 17, fontWeight: 900, textTransform: 'uppercase',
                    letterSpacing: '0.04em',
                    color: isMe ? TERRA : BLACK,
                    position: desktop ? 'static' : 'sticky', left: 0,
                    background: rowBg, zIndex: 1,
                    boxShadow: desktop ? 'none' : (isMe ? `4px 0 0 0 ${TERRA}, 4px 0 6px -2px rgba(0,0,0,0.08)` : '4px 0 6px -2px rgba(0,0,0,0.08)'),
                    borderTop: isMe && !desktop ? `2px solid ${TERRA}` : 'none',
                    borderBottom: isMe && !desktop ? `2px solid ${TERRA}` : '1px solid rgba(17,17,17,0.07)',
                    borderLeft: isMe && !desktop ? `2px solid ${TERRA}` : 'none',
                  }}>{p.naam}</td>
                  {MONTH_KEYS.map(k => (
                    <td key={k} style={{
                      ...tdStyle,
                      color: p[k] > 0 ? BLACK : 'rgba(17,17,17,0.22)',
                      fontFamily: "'Fragment Mono', monospace",
                      fontSize: 11,
                    }}>{fmt(p[k])}</td>
                  ))}
                  <td style={{
                    ...tdStyle,
                    fontFamily: "'Fragment Mono', monospace", fontSize: 11,
                    color: BLACK, fontWeight: 700,
                  }}>€ {p.totaal}</td>
                  <td style={{
                    ...tdStyle,
                    fontFamily: "'Fragment Mono', monospace", fontSize: 11,
                    color: voldaan ? '#1f8a5b' : TERRA,
                    fontWeight: 700,
                  }}>{voldaan ? '✓' : `€ ${p.open}`}</td>
                </tr>
              );
            })}
          </tbody>
          </table>
        </div>
        {!desktop && (
          <div style={{
            position: 'absolute', right: 0, top: 0, bottom: 0,
            width: 56, pointerEvents: 'none',
            background: `linear-gradient(to right, transparent, ${BEIGE})`,
            display: 'flex', alignItems: 'center', justifyContent: 'flex-end',
            paddingRight: 8,
          }}>
            <span style={{
              fontFamily: "'Fragment Mono', monospace",
              fontSize: 16, color: TERRA,
            }}>›</span>
          </div>
        )}
      </div>
    </>
  );

  if (desktop) {
    return (
      <SubShell maxWidth={1200}>
        {content}
      </SubShell>
    );
  }
  return (
    <div style={{ background: BEIGE, minHeight: '100vh', padding: '24px 20px 48px', position: 'relative', overflow: 'hidden' }}>
      <RWatermark color="rgba(196,74,42,0.05)" size={280}/>
      <div style={{ position: 'relative', zIndex: 1 }}>
        <MobileBack setCurrentPage={setCurrentPage}/>
        {content}
        <div style={{ marginTop: 28 }}>
          <MobileNavButtons setCurrentPage={setCurrentPage} exclude="betalingen"/>
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
const App = () => {
  const [currentPage, setCurrentPage] = React.useState('home');
  const desktop = useIsDesktop();
  const [playerName, chooseName, chooseGuest] = usePlayerName();

  React.useEffect(() => { window.scrollTo(0, 0); }, [currentPage]);

  // Preload all background images on mount
  React.useEffect(() => {
    const images = ['Hero.jpg', 'Paklijst.jpg', 'Weersverwachting.jpg', 'Locatie.jpg', 'Slaapkamer.jpg'];
    images.forEach(src => {
      const img = new Image();
      img.src = src;
    });
  }, []);

  if (!playerName) return <NameGate onChoose={chooseName} onGuest={chooseGuest}/>;

  const props = { setCurrentPage, desktop, playerName };

  const renderPage = () => {
    switch(currentPage) {
      case 'programma': return <ProgrammaPage {...props}/>;
      case 'paklijst':  return <PaklijstPage  {...props}/>;
      case 'weer':      return <WeerPage      {...props}/>;
      case 'locatie':        return <LocatiePage        {...props}/>;
      case 'kamerindeling': return <KamerindelingPage {...props}/>;
      case 'betalingen':    return <BetalingenPage    {...props}/>;
      case 'playlist':      return <PlaylistPage      {...props}/>;
      default:               return <HomePage           {...props}/>;
    }
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100%', background: BLACK }}>
      <Topbar currentPage={currentPage} setCurrentPage={setCurrentPage} desktop={desktop}/>
      <div style={{ flex: 1, paddingBottom: desktop ? 0 : 44 }}>{renderPage()}</div>
      {!desktop && <BottomTabBar currentPage={currentPage} setCurrentPage={setCurrentPage}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
