function useIsDesktop() {
  const [d, setD] = React.useState(() => window.innerWidth >= 768);
  React.useEffect(() => {
    const mq = window.matchMedia('(min-width: 768px)');
    const h = e => setD(e.matches);
    mq.addEventListener('change', h);
    return () => mq.removeEventListener('change', h);
  }, []);
  return d;
}

function useCountdown() {
  const [now, setNow] = React.useState(new Date());
  React.useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const target = new Date('2026-06-25T06:00:00+02:00');
  const diff = Math.max(0, target - now);
  return {
    days:    Math.floor(diff / 86400000),
    hours:   Math.floor((diff / 3600000) % 24),
    minutes: Math.floor((diff / 60000) % 60),
    seconds: Math.floor((diff / 1000) % 60),
  };
}

function usePlayerName() {
  const [name, setName] = React.useState(() => localStorage.getItem('rmly_name') || null);

  const chooseGuest = () => { setName('Gast'); };
  return [name, choose, chooseGuest];
}

// ─── useTeksten ───────────────────────────────────────────────────────────────
function useTeksten() {
  const [teksten, setTeksten] = React.useState(DEFAULT_TEKSTEN);
  React.useEffect(() => {
    sb.from('teksten').select('*').then(({ data }) => {
      if (data && data.length > 0) {
        const overrides = {};
        data.forEach(row => { overrides[row.sleutel] = row.waarde; });
        setTeksten(prev => ({ ...prev, ...overrides }));
      }
    });
  }, []);
  const t = (key) => teksten[key] ?? DEFAULT_TEKSTEN[key] ?? '';
  return [t, teksten, setTeksten];
}

// ─── useBetalingen ────────────────────────────────────────────────────────────
function useBetalingen() {
  const [data, setData] = React.useState(PAYMENTS);
  React.useEffect(() => {
    sb.from('betalingen').select('*').then(({ data: rows }) => {
      if (rows && rows.length > 0) {
        const volgorde = ['Bram','Hugo','Daan','Lars','Pepijn','Sebas','Sander','Stijn'];
        rows.sort((a, b) => {
          const ai = volgorde.indexOf(a.naam);
          const bi = volgorde.indexOf(b.naam);
          if (ai !== -1 && bi !== -1) return ai - bi;
          if (ai !== -1) return -1;
          if (bi !== -1) return 1;
          return a.naam.localeCompare(b.naam);
        });
        setData(rows);
      }
    });
  }, []);
  return [data, setData];
}

// ─── FadeIn ───────────────────────────────────────────────────────────────────
function FadeIn({ children, delay, style }) {
  const ref = React.useRef(null);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold: 0.1 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? 'translateY(0)' : 'translateY(22px)',
      transition: `opacity 600ms ease ${delay || 0}ms, transform 600ms ease ${delay || 0}ms`,
      ...style,
    }}>
      {children}
    </div>
  );
}

// ─── Admin: BetalingenEditor ──────────────────────────────────────────────────
function BetalingenEditor({ betalingen, setBetalingen }) {
  const [opslaan, setOpslaan] = React.useState({});

  const updateVeld = (naam, veld, waarde) => {
    setBetalingen(prev => prev.map(p => {
      if (p.naam !== naam) return p;
      const updated = { ...p, [veld]: Number(waarde) };
      const betaald = MONTH_KEYS.reduce((sum, k) => sum + (Number(updated[k]) || 0), 0);
      updated.totaal = betaald;
      updated.open = Math.max(0, 480 - betaald);
      return updated;
    }));
  };

  const slaOp = async (naam) => {
    const persoon = betalingen.find(p => p.naam === naam);
    setOpslaan(prev => ({ ...prev, [naam]: 'laden' }));
    const { error } = await sb.from('betalingen').upsert(persoon, { onConflict: 'naam' });
    setOpslaan(prev => ({ ...prev, [naam]: error ? 'fout' : 'ok' }));
    setTimeout(() => setOpslaan(prev => ({ ...prev, [naam]: null })), 2500);
  };

  const slaAllesOp = async () => {
    setOpslaan({ _all: 'laden' });
    for (const p of betalingen) {
      await sb.from('betalingen').upsert(p, { onConflict: 'naam' });
    }
    setOpslaan({ _all: 'ok' });
    setTimeout(() => setOpslaan({}), 2500);
  };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 20 }}>
        <button onClick={slaAllesOp} style={{
          appearance: 'none',
          background: opslaan._all === 'ok' ? '#1f8a5b' : TERRA,
          border: 'none', color: BEIGE,
          fontFamily: "'Barlow Condensed', sans-serif",
          fontSize: 18, fontWeight: 900, textTransform: 'uppercase',
          letterSpacing: '0.04em', padding: '10px 24px', cursor: 'pointer',
        }}>
          {opslaan._all === 'laden' ? 'Bezig...' : opslaan._all === 'ok' ? '✓ Alles opgeslagen' : 'Alles opslaan'}
        </button>
      </div>
      {betalingen.map(p => (
        <div key={p.naam} style={{
          marginBottom: 16,
          background: 'rgba(245,240,232,0.04)',
          border: '1px solid rgba(245,240,232,0.09)',
          padding: '14px 18px',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
            <div>
              <span style={{
                fontFamily: "'Barlow Condensed', sans-serif",
                fontSize: 22, fontWeight: 900, textTransform: 'uppercase',
                letterSpacing: '0.04em', color: BEIGE,
              }}>{p.naam}</span>
              <span style={{
                fontFamily: "'Fragment Mono', monospace",
                fontSize: 10,
                color: p.open === 0 ? '#1f8a5b' : TERRA,
                marginLeft: 14,
              }}>
                {p.open === 0 ? '✓ Voldaan' : `€ ${p.open} open`} · Betaald: € {p.totaal}
              </span>
            </div>
            <button onClick={() => slaOp(p.naam)} style={{
              appearance: 'none',
              background: opslaan[p.naam] === 'ok' ? '#1f8a5b' : 'rgba(196,74,42,0.75)',
              border: 'none', color: BEIGE,
              fontFamily: "'Fragment Mono', monospace",
              fontSize: 9, letterSpacing: '0.2em', textTransform: 'uppercase',
              padding: '7px 14px', cursor: 'pointer', flexShrink: 0,
            }}>
              {opslaan[p.naam] === 'laden' ? '...' : opslaan[p.naam] === 'ok' ? '✓' : 'Opslaan'}
            </button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8 }}>
            {MONTH_KEYS.map((k, idx) => (
              <div key={k}>
                <div style={{
                  fontFamily: "'Fragment Mono', monospace",
                  fontSize: 8, letterSpacing: '0.15em', textTransform: 'uppercase',
                  color: 'rgba(245,240,232,0.30)', marginBottom: 4,
                }}>{MONTHS[idx]}</div>
                <input
                  type="number" min="0" step="48"
                  value={p[k]}
                  onChange={e => updateVeld(p.naam, k, e.target.value)}
                  style={{
                    width: '100%',
                    background: p[k] > 0 ? 'rgba(196,74,42,0.15)' : 'rgba(245,240,232,0.06)',
                    border: '1px solid rgba(245,240,232,0.10)',
                    color: BEIGE,
                    fontFamily: "'Fragment Mono', monospace",
                    fontSize: 12, padding: '6px 8px',
                    boxSizing: 'border-box', outline: 'none',
                  }}
                />
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

  const LABELS = {

  };

  const slaOp = async (sleutel) => {
    setOpslaan(prev => ({ ...prev, [sleutel]: 'laden' }));
    const { error } = await sb.from('teksten').upsert({ sleutel, waarde: teksten[sleutel] }, { onConflict: 'sleutel' });
    setOpslaan(prev => ({ ...prev, [sleutel]: error ? 'fout' : 'ok' }));
    setTimeout(() => setOpslaan(prev => ({ ...prev, [sleutel]: null })), 2500);
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      {Object.keys(LABELS).map(sleutel => (
        <div key={sleutel} style={{
          background: 'rgba(245,240,232,0.04)',
          border: '1px solid rgba(245,240,232,0.09)',
          padding: '14px 18px',
        }}>
          <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 10, gap: 16 }}>
            <div>
              <div style={{
                fontFamily: "'Fragment Mono', monospace",
                fontSize: 9, letterSpacing: '0.15em', textTransform: 'uppercase',
                color: TERRA, marginBottom: 2,
              }}>{LABELS[sleutel]}</div>
              <div style={{
                fontFamily: "'Fragment Mono', monospace",
                fontSize: 8, color: 'rgba(245,240,232,0.22)',
              }}>{sleutel}</div>
            </div>
            <button onClick={() => slaOp(sleutel)} style={{
              appearance: 'none',
              background: opslaan[sleutel] === 'ok' ? '#1f8a5b' : TERRA,
              border: 'none', color: BEIGE,
              fontFamily: "'Fragment Mono', monospace",
              fontSize: 9, letterSpacing: '0.2em', textTransform: 'uppercase',
              padding: '7px 16px', cursor: 'pointer', flexShrink: 0,
            }}>
              {opslaan[sleutel] === 'laden' ? '...' : opslaan[sleutel] === 'ok' ? '✓ Opgeslagen' : 'Opslaan'}
            </button>
          </div>
          <textarea
            value={teksten[sleutel] || ''}
            onChange={e => setTeksten(prev => ({ ...prev, [sleutel]: e.target.value }))}
            rows={sleutel === 'faq_items' ? 10 : sleutel.includes('tekst') ? 4 : 2}
            style={{
              width: '100%',
              background: 'rgba(245,240,232,0.07)',
              border: '1px solid rgba(245,240,232,0.10)',
              color: BEIGE,
              fontFamily: sleutel === 'faq_items' ? "'Fragment Mono', monospace" : "'DM Sans', sans-serif",
              fontSize: sleutel === 'faq_items' ? 11 : 13,
              fontWeight: 300,
              padding: '10px 12px',
              boxSizing: 'border-box',
              outline: 'none',
              resize: 'vertical',
              lineHeight: 1.55,
            }}
          />
        </div>
      ))}
    </div>
  );
}

// ─── Admin: WachtwoordEditor ──────────────────────────────────────────────────
function WachtwoordEditor({ huidigWw }) {
  const [oud, setOud] = React.useState('');
  const [nieuw, setNieuw] = React.useState('');
  const [bevestig, setBevestig] = React.useState('');
  const [status, setStatus] = React.useState(null);

  const slaOp = async () => {
    if (oud !== huidigWw) { setStatus('Huidig wachtwoord klopt niet.'); return; }
    if (nieuw.length < 4)  { setStatus('Nieuw wachtwoord moet minimaal 4 tekens zijn.'); return; }
    if (nieuw !== bevestig){ setStatus('Wachtwoorden komen niet overeen.'); return; }
    setStatus('laden');
    const { error } = await sb.from('teksten').upsert(
      { sleutel: 'admin_wachtwoord', waarde: nieuw },
      { onConflict: 'sleutel' }
    );
    if (error) { setStatus('Fout bij opslaan. Probeer opnieuw.'); return; }
    setStatus('ok');
    setOud(''); setNieuw(''); setBevestig('');
  };

  const veldStyle = {
    width: '100%',
    background: 'rgba(245,240,232,0.07)',
    border: '1px solid rgba(245,240,232,0.12)',
    color: BEIGE,
    fontFamily: "'Fragment Mono', monospace",
    fontSize: 13, padding: '11px 14px',
    boxSizing: 'border-box', outline: 'none',
    marginBottom: 10,
  };

  return (
    <div style={{ maxWidth: 440 }}>
      <div style={{
        fontFamily: "'Fragment Mono', monospace",
        fontSize: 9, letterSpacing: '0.2em', textTransform: 'uppercase',
        color: 'rgba(245,240,232,0.40)', marginBottom: 20, lineHeight: 1.7,
      }}>
        Het wachtwoord wordt opgeslagen in Supabase.<br/>
        Bij een wijziging wordt het nieuwe wachtwoord direct actief.
      </div>

      <div style={{ fontFamily: "'Fragment Mono', monospace", fontSize: 8, letterSpacing: '0.15em', textTransform: 'uppercase', color: 'rgba(245,240,232,0.30)', marginBottom: 5 }}>Huidig wachtwoord</div>
      <input type="password" placeholder="••••••••" value={oud} onChange={e => { setOud(e.target.value); setStatus(null); }} style={veldStyle}/>

      <div style={{ fontFamily: "'Fragment Mono', monospace", fontSize: 8, letterSpacing: '0.15em', textTransform: 'uppercase', color: 'rgba(245,240,232,0.30)', marginBottom: 5, marginTop: 6 }}>Nieuw wachtwoord</div>
      <input type="password" placeholder="••••••••" value={nieuw} onChange={e => { setNieuw(e.target.value); setStatus(null); }} style={veldStyle}/>

      <div style={{ fontFamily: "'Fragment Mono', monospace", fontSize: 8, letterSpacing: '0.15em', textTransform: 'uppercase', color: 'rgba(245,240,232,0.30)', marginBottom: 5 }}>Bevestig nieuw wachtwoord</div>
      <input type="password" placeholder="••••••••" value={bevestig} onChange={e => { setBevestig(e.target.value); setStatus(null); }} onKeyDown={e => e.key === 'Enter' && slaOp()} style={veldStyle}/>

      {status && status !== 'laden' && status !== 'ok' && (
        <div style={{ fontFamily: "'Fragment Mono', monospace", fontSize: 10, color: TERRA, marginBottom: 10 }}>{status}</div>
      )}
      {status === 'ok' && (
        <div style={{ fontFamily: "'Fragment Mono', monospace", fontSize: 10, color: '#1f8a5b', marginBottom: 10 }}>✓ Wachtwoord gewijzigd</div>
      )}
      <button onClick={slaOp} style={{
        appearance: 'none',
        background: status === 'ok' ? '#1f8a5b' : TERRA,
        border: 'none', color: BEIGE,
        fontFamily: "'Barlow Condensed', sans-serif",
        fontSize: 20, fontWeight: 900, textTransform: 'uppercase',
        letterSpacing: '0.04em', padding: '12px 28px', cursor: 'pointer', marginTop: 4,
      }}>
        {status === 'laden' ? 'Bezig...' : status === 'ok' ? '✓ Opgeslagen' : 'Wachtwoord wijzigen'}
      </button>
    </div>
  );
}

// ─── AdminPage ────────────────────────────────────────────────────────────────
function AdminPage({ setCurrentPage }) {
  const [authed, setAuthed] = React.useState(false);

    <div style={{ background: DEEP, minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 32 }}>
      <div style={{ maxWidth: 360, width: '100%' }}>

        <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 52, fontWeight: 900, textTransform: 'uppercase', lineHeight: 0.9, color: BEIGE, marginBottom: 32 }}>Beheer<br/>Paneel</div>
        <input type="password" placeholder="Wachtwoord" value={ww} disabled={wwLaden}
          onChange={e => { setWw(e.target.value); setFout(false); }}
          onKeyDown={e => e.key === 'Enter' && !wwLaden && login()}
          style={veldStyle(fout)}

        {fout && <div style={{ fontFamily: "'Fragment Mono', monospace", fontSize: 10, color: TERRA, marginBottom: 12 }}>Onjuist wachtwoord</div>}
        <button onClick={login} disabled={wwLaden} style={{ width: '100%', background: TERRA, border: 'none', color: BEIGE, fontFamily: "'Barlow Condensed', sans-serif", fontSize: 22, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.04em', padding: '14px 0', cursor: 'pointer', marginBottom: 10, opacity: wwLaden ? 0.5 : 1 }}>Inloggen</button>

      </div>

  );

  return (

      </div>
      <div style={{ display: 'flex', gap: 0, marginBottom: 28, borderBottom: '1px solid rgba(245,240,232,0.10)' }}>

  );
}

// ─── BrilPopup ────────────────────────────────────────────────────────────────
function BrilPopup({ playerName }) {
  const [closed, setClosed] = React.useState(false);
  const [landed, setLanded] = React.useState(false);
  const recipient = BRIL_PAIRS[playerName];
  const [homeLanding] = React.useState(() => {
    const h = window.location.hash;
    return h === '' || h === '#home';
  });

  // Bouw de lijst met namen die over het rad heen scrollen (eindigt op recipient)
  const spinList = React.useMemo(() => {
    if (!recipient) return [];
    const others = NAMES.filter(n => n !== playerName);
    const arr = [];
    for (let i = 0; i < 6; i++) {
      arr.push(...[...others].sort(() => Math.random() - 0.5));
    }
    arr.push(recipient);
    return arr;
  }, [recipient, playerName]);

  // Start de animatie kort na mount + track event naar GA
  React.useEffect(() => {
    if (!BRIL_POPUP_ACTIVE || closed || !recipient || playerName === 'Gast' || !homeLanding) return;
    // Stuur een event naar Google Analytics: zo zie je wie de popup heeft gezien
    if (typeof window.gtag === 'function') {
      window.gtag('event', 'bril_popup_shown', {
        gebruiker_naam: playerName,
        bril_voor: recipient,
      });
    }
    const t = setTimeout(() => setLanded(true), 400);
    return () => clearTimeout(t);
  }, [closed, recipient, playerName]);

  if (!BRIL_POPUP_ACTIVE || closed || !recipient || playerName === 'Gast' || !homeLanding) return null;

const paginaVanHash = () => { const h = window.location.hash.slice(1); return PAGINAS.has(h) ? h : 'home'; };

const App = () => {
  const [currentPage, setCurrentPage] = React.useState(paginaVanHash);
  const desktop = useIsDesktop();
  const [playerName, chooseName, chooseGuest] = usePlayerName();
  const [t, teksten, setTeksten] = useTeksten();
  const [betalingen, setBetalingen] = useBetalingen();

  // URL hash bijhouden bij paginawissel
  React.useEffect(() => {
    if (currentPage === 'admin') return;
    const nieuweHash = currentPage === 'home' ? window.location.pathname : '#' + currentPage;
    if (window.location.hash !== (currentPage === 'home' ? '' : '#' + currentPage)) {
      history.pushState(null, '', nieuweHash);
    }
  }, [currentPage]);

  // Browser terug/vooruit knop
  React.useEffect(() => {
    const onPop = () => setCurrentPage(paginaVanHash());
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  React.useEffect(() => { window.scrollTo(0, 0); }, [currentPage]);

  // Preload all background images on mount
  React.useEffect(() => {
    const images = ['Hero.jpg', 'Paklijst.jpg', 'Weersverwachting.jpg', 'Locatie.jpg', 'Slaapkamer.jpg'];
    images.forEach(src => {
      const img = new Image();
      img.src = src;
    });
  }, []);

  // Google Analytics: stuur pageview met naam bij elke navigatie
  React.useEffect(() => {
    if (typeof window.gtag === 'function' && playerName) {
      window.gtag('set', { user_id: playerName });
      window.gtag('set', 'user_properties', { gebruiker_naam: playerName });
      window.gtag('event', 'page_view', {
        page_path: '/' + currentPage,
        page_title: 'RMLY · ' + currentPage,
        page_location: window.location.origin + '/' + currentPage,
        gebruiker_naam: playerName,
      });
    }
  }, [currentPage, playerName]);

  if (!playerName) return <NameGate onChoose={chooseName} onGuest={chooseGuest}/>;

  const props = { setCurrentPage, desktop, playerName, t, betalingen };

  const renderPage = () => {
    switch(currentPage) {
      case 'admin':          return <AdminPage         setCurrentPage={setCurrentPage}/>;
      case 'programma':      return <ProgrammaPage     {...props}/>;
      case 'paklijst':       return <PaklijstPage      {...props}/>;
      case 'weer':           return <WeerPage          {...props}/>;
      case 'locatie':        return <LocatiePage        {...props}/>;
      case 'kamerindeling':  return <KamerindelingPage {...props}/>;
      case 'betalingen':     return <BetalingenPage    {...props}/>;
      case 'playlist':       return <PlaylistPage      {...props}/>;
      default:               return <HomePage           {...props}/>;
    }
  };

  const isAdminPage = currentPage === 'admin';

  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100%', background: BLACK }}>
      {!isAdminPage && <Topbar currentPage={currentPage} setCurrentPage={setCurrentPage} desktop={desktop}/>}
      <div style={{ flex: 1, paddingBottom: desktop || isAdminPage ? 0 : 44 }}>{renderPage()}</div>
      {!desktop && !isAdminPage && <BottomTabBar currentPage={currentPage} setCurrentPage={setCurrentPage}/>}
      {!isAdminPage && <BrilPopup playerName={playerName}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
